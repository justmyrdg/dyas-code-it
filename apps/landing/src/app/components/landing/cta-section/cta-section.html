<section class="bg-gray-950 text-white">
  <div
    class="mx-auto flex max-w-7xl flex-col items-center gap-6 px-5 py-16 text-center sm:px-20 lg:py-20"
  >
    <p
      class="inline-flex rounded-full border-2 border-black bg-yellow-400 px-4 py-2 text-sm font-black text-gray-950 shadow-md"
    >
      Stay in the loop
    </p>
    <h2 class="max-w-2xl text-4xl font-black leading-tight sm:text-5xl">
      Get new lessons and features before everyone else.
    </h2>
    <p class="max-w-xl font-semibold text-gray-300">
      One email a month. No spam, unsubscribe anytime.
    </p>
    <form
      method="post"
      action="/api/newsletter/subscribe"
      class="mt-2 flex w-full max-w-md flex-row gap-3"
    >
      <label for="newsletter-email" class="sr-only">Email address</label>
      <input
        id="newsletter-email"
        name="email"
        type="email"
        required
        placeholder="you@example.com"
        class="w-full flex-1 rounded-xl border-2 border-black bg-white px-5 py-3 font-semibold text-gray-950 shadow-sm transition focus:outline-none focus:ring-4 focus:ring-blue-600/25"
      />
      <button
        type="submit"
        class="inline-flex justify-center rounded-xl border-2 border-white bg-red-600 px-6 py-3 font-black text-white shadow-md transition hover:-translate-y-0.5 hover:shadow-lg active:scale-95"
      >
        Subscribe
      </button>
    </form>
  </div>
</section>
